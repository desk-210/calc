name: Build Kivy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Cython and Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33
          pip install buildozer
      
      - name: Configure Buildozer
        run: |
          # Ensure buildozer.spec exists
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          # Fix for known p4a issue - use stable branch
          sed -i 's/# p4a.branch = master/p4a.branch = release-2022.12.20/g' buildozer.spec
      
      - name: Build APK
        run: buildozer -v android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-apk
          path: ./bin/*.apk
